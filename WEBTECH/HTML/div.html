<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>div element</title>
    <style>
        *{
            padding: 0%;
            margin: 0%;
            box-sizing: border-box;
        }
        #nav{
            background-color: rgb(71, 224, 224);
            display: flex;
            height:80px;
            justify-content: space-around;
            align-items: center;
        }
        ul{
            display: flex;
            gap: 20px;
        }
        li{
            list-style: none;
            text-transform: capitalize;
            font-size: 18px;
            cursor: pointer;
            letter-spacing: 2px;
            font-weight: bolder;
        }
        #main{
            height: 250px;
            background-color: rgb(69, 195, 23);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 10px;

        }
        p{
            font-family: 'Courier New', Courier, monospace;
            
        }
        button{
            background-color: rgb(103, 130, 130);
        }
        #section{
            height: calc(100vh - 330px);
            background-color: blueviolet;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .card{
            height: 200px;
            width: 300px;
            background-color: honeydew;
            border-radius: 20px;
            padding: 50px;
            text-align: center;
            box-shadow: 0;


        }

    </style>
</head>
<body>
    <div id="nav">   
        <h1>My logo</h1>
        <ul>
            <li>home</li>
            <li>about </li>
            <li>cont us</li>
        </ul>
    </div>
    <div id="main">
        <h1>Welcome to my application</h1>
        <p>Here you to get 50% discount</p>
        <button>shop now</button>
    </div>
    <div id="section">
        <div class="card">
            <h3>iam card 1</h3>
        </div>
        <div class="card">
            <h3>iam card 2</h3>
        </div>
        <div class="card">
            <h3>iam card 3</h3>
        </div>

    </div>

    
</body>
</html>
